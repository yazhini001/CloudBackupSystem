<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<nav class="navbar navbar-dark bg-primary">

<div class="container-fluid">

<span class="navbar-brand">

☁ Cloud Backup System

</span>

<span class="text-white">

Welcome, {{ username }}

</span>

</div>

</nav>

<div class="container mt-4">

<div class="row">

<div class="col-md-4">

<div class="card dashboard-card text-center p-3">

<h4>📁 Total Files</h4>

<h2>{{ file_count }}</h2>

</div>

</div>

<div class="col-md-4">

<div class="card dashboard-card text-center p-3">

<h4>💾 Storage Used</h4>

<h2>{{ total_size }} KB</h2>

</div>

</div>

<div class="col-md-4">

<div class="card dashboard-card text-center p-3">

<h4>⭐ Favorites</h4>

<h2>--</h2>

</div>

</div>

</div>
<hr>

<h3 class="page-title mb-4">
    Quick Actions
</h3>

<div class="row g-4">

    <div class="col-md-4">
        <a href="/upload" class="text-decoration-none">
            <div class="card dashboard-card text-center p-4">
                <h1>📤</h1>
                <h5>Upload File</h5>
            </div>
        </a>
    </div>

    <div class="col-md-4">
        <a href="/files" class="text-decoration-none">
            <div class="card dashboard-card text-center p-4">
                <h1>📂</h1>
                <h5>View Files</h5>
            </div>
        </a>
    </div>

    <div class="col-md-4">
        <a href="/favorites" class="text-decoration-none">
            <div class="card dashboard-card text-center p-4">
                <h1>⭐</h1>
                <h5>Favorites</h5>
            </div>
        </a>
    </div>

    <div class="col-md-4">
        <a href="/recycle_bin" class="text-decoration-none">
            <div class="card dashboard-card text-center p-4">
                <h1>🗑</h1>
                <h5>Recycle Bin</h5>
            </div>
        </a>
    </div>

    <div class="col-md-4">
        <a href="/profile" class="text-decoration-none">
            <div class="card dashboard-card text-center p-4">
                <h1>👤</h1>
                <h5>My Profile</h5>
            </div>
        </a>
    </div>

    <div class="col-md-4">
        <a href="/change_password" class="text-decoration-none">
            <div class="card dashboard-card text-center p-4">
                <h1>🔒</h1>
                <h5>Change Password</h5>
            </div>
        </a>
    </div>

</div>

<div class="mt-4 d-grid">
    <a href="/logout" class="btn btn-danger btn-lg">
        🚪 Logout
    </a>
</div>

</body>

</html>
